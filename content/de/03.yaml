meta:
  doc_id: "03"
  title: "KURZREFERENZKARTE"
  subtitle: "Ausdrucken und in die Tischmitte legen"
  header: "A N A M N E S I A  ·  K U R Z R E F E R E N Z K A R T E"
  footer: "© 2026 Riccardo Scaringi · ilgiocointavolo · ioGioco"

roll_section:
  title: "WÜRFELFORMEL"
  steps:
    - "1. Wähle einen Ansatz (kostenlos / +1 / +2 Fragmente)"
    - "2. Investiere Fragmente aus dem Pool (1–4 Würfel)"
    - "3. Würfle: der Spieler zu deiner RECHTEN interpretiert"
  dice_col_headers: ["Würfel", "Typ", "Effekt"]
  dice_rows:
    - ["5–6", "Klar",       "Eine lebhafte Erinnerung"]
    - ["3–4", "Verwirrt",   "Eine zweideutige Erinnerung"]
    - ["1–2", "Traumatisch","+1 permanentes Echo"]

outcomes_section:
  title: "ERGEBNISSE"
  col_headers: ["Klare", "Ergebnis", "Konsequenz"]
  rows:
    - ["3+", "Voller Erfolg",          "Keine Konsequenz."]
    - ["2",  "Teilerfolg",             "Unvollständige Erinnerung oder emotionale Kosten."]
    - ["1",  "Schmerzhafte Wahrheit",  "Echte, aber schmerzliche Erinnerung. Möglicher Stress."]
    - ["0",  "Erinnerungszusammenbruch","+1 Stress. Narrative Komplikation."]

pool_section:
  title: "POOL UND STRESS"
  formula: "Aktueller Pool = Basis-Pool − Stress − Echo-Malus (min. 1)"
  echi_label: "Echos:"
  echi_rows:
    - ["0–2", "kein Malus"]
    - ["3–5", "−1 Würfel"]
    - ["6–8", "−3 Würfel"]
    - ["9+",  "außer Spiel"]
  stress_col_headers: ["Stress", "Effekt"]
  stress_rows:
    - ["0–2", "Kontrolle"]
    - ["3",   "Wachsende Angst"]
    - ["4",   "Partieller Zusammenbruch"]
    - ["5",   "Finaler Zusammenbruch"]

special_section:
  title: "SONDERMECHANIKEN"
  mechanics:
    - name: "Erinnerung erzwingen"
      text: "Nach Schmerzhafte Wahrheit oder Zusammenbruch: verbessere das Ergebnis um 1 Stufe. Kosten: +1 Stress. Teilerfolg kann nicht erzwungen werden."
    - name: "Der Anker (1× pro Sitzung)"
      text: "Mit mindestens 2 Stress: erzähle einen Moment, der mit deinem Anker verbunden ist. Der Spieler zu deiner Rechten beschreibt die zugehörige Erinnerung. −1 Stress, +1 Fragment."
    - name: "Letzte Erinnerung (1× pro Sitzung)"
      text: "Mit Pool auf 1 Würfel: würfle 3W6 und ignoriere alle Strafen. Dann +1 Stress trotzdem."
    - name: "Die Wahrheit tritt immer hervor (nur Runde 5)"
      text: "Ein Zusammenbruch enthüllt die Erinnerung trotzdem, kostet aber +2 Stress statt +1. Der Hüter kann ein Detail hinzufügen, das die Wahrheit verschlimmert."

recovery_section:
  title: "STRESS-ERHOLUNG"
  items:
    - "Archetyp-Verwundbarkeit: −1 Stress, max. 1/Runde"
    - "Menschliche Verbindung: am Ende der Runden 1–4, wenn kein Zusammenbruch"
    - "Anker: 1× pro Sitzung, erfordert Stress ≥ 2"

sensory_section:
  title: "SENSORISCHER TRIGGERGENERATOR (1W6)"
  col_headers: ["W6", "Sinn", "Beispiele"]
  rows:
    - ["1", "Geruch",  "Desinfektionsmittel, Rauch, Blut, Parfüm"]
    - ["2", "Ton",     "Summen, Gegensprechanlage, Weinen, Glas, Stille"]
    - ["3", "Sicht",   "Flackerndes Neon, gesprungener Spiegel, bewegender Schatten"]
    - ["4", "Berührung","Kälte, Nässe, ein Zeichen auf der Haut"]
    - ["5", "Geschmack","Metallisch, bitter, medizinisch, Rost"]
    - ["6", "Emotion", "Plötzliche Angst, Schuldgefühle, Scham, Leere"]

closing_quote: "«Der Spieler zu deiner Rechten interpretiert deinen Wurf, nicht du.»"
