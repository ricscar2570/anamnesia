questions_section:
  title: "FRAGEN PRO PHASE"
  phases:
    - label: "Nebel (Runden 1–2)"
      questions:
        - "Was spürst du, wenn du die Augen schließt?"
        - "Warum zittert deine Hand?"
        - "Das Zeichen auf deinem Handgelenk: hast du es dir selbst gemacht?"
    - label: "Verbindungen (Runden 3–4)"
      questions:
        - "Wer hat euch von dem Programm erzählt?"
        - "Kanntet ihr den fünften Teilnehmer?"
        - "Warum wolltet ihr vergessen?"
    - label: "Enthüllungen (Runde 5)"
      questions:
        - "Jetzt, wo ihr euch erinnert: was tut ihr?"
        - "Könnt ihr euch vergeben?"
        - "Wenn ihr wieder vergessen könntet, würdet ihr es tun?"

