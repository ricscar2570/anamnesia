questions_section:
  title: "PREGUNTAS POR FASE"
  phases:
    - label: "Niebla (Turnos 1–2)"
      questions:
        - "¿Qué sientes cuando cierras los ojos?"
        - "¿Por qué te tiembla la mano?"
        - "Esa marca en tu muñeca: ¿te la hiciste tú?"
    - label: "Conexiones (Turnos 3–4)"
      questions:
        - "¿Quién os habló del programa?"
        - "¿Conocíais al quinto participante?"
        - "¿Por qué queríais olvidar?"
    - label: "Revelaciones (Turno 5)"
      questions:
        - "Ahora que recordáis, ¿qué hacéis?"
        - "¿Podéis perdonaros?"
        - "Si pudierais olvidar de nuevo, ¿lo haríais?"

