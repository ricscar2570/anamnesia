questions_section:
  title: "DOMANDE PER FASE"
  phases:
    - label: "Nebbia (Cicli 1–2)"
      questions:
        - "Cosa senti quando chiudi gli occhi?"
        - "Perché la tua mano trema?"
        - "Quel segno sul polso: te lo sei fatto tu?"
    - label: "Connessioni (Cicli 3–4)"
      questions:
        - "Chi vi ha parlato del programma?"
        - "Conoscevate il quinto partecipante?"
        - "Perché volevate dimenticare?"
    - label: "Rivelazioni (Ciclo 5)"
      questions:
        - "Adesso che ricordate, cosa fate?"
        - "Potete perdonarvi?"
        - "Se poteste dimenticare di nuovo, lo fareste?"

