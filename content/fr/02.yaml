phases_section:
  title: "PHASES DU JEU"
  col_headers: ["Phase", "Tours", "Cartes", "Atmosphère"]
  rows:
    - ["Brume",       "1–2", "Acte I seul",    "Impressions vagues, confusion sensorielle"]
    - ["Connexions",  "3–4", "Acte I + II",    "Détails concrets, tension relationnelle"]
    - ["Révélations", "5",   "Acte II + III",  "Vérité brute, confrontation finale"]

questions_section:
  title: "QUESTIONS PAR PHASE"
  phases:
    - label: "Brume (Tours 1–2)"
      questions:
        - "Qu'est-ce que tu ressens quand tu fermes les yeux?"
        - "Pourquoi ta main tremble-t-elle?"
        - "Cette marque sur ton poignet: tu te l'es faite toi-même?"
    - label: "Connexions (Tours 3–4)"
      questions:
        - "Qui vous a parlé du programme?"
        - "Connaissiez-vous le cinquième participant?"
        - "Pourquoi vouliez-vous oublier?"
    - label: "Révélations (Tour 5)"
      questions:
        - "Maintenant que vous vous souvenez, qu'est-ce que vous faites?"
        - "Pouvez-vous vous pardonner?"
        - "Si vous pouviez oublier à nouveau, le feriez-vous?"

