meta:
  doc_id: "03"
  title: "AIDE DE JEU RAPIDE"
  subtitle: "À imprimer et à poser au centre de la table"
  header: "A N A M N E S I A  ·  A I D E  D E  J E U  R A P I D E"
  footer: "© 2026 Riccardo Scaringi · ilgiocointavolo · ioGioco"

roll_section:
  title: "FORMULE DU JET"
  steps:
    - "1. Choisis une Approche (gratuite / +1 / +2 Fragments)"
    - "2. Investis des Fragments depuis ta Réserve (1–4 dés)"
    - "3. Lance les dés: le joueur à ta DROITE interprète le résultat"
  dice_col_headers: ["Dé", "Type", "Effet"]
  dice_rows:
    - ["5–6", "Clair",       "Un souvenir net"]
    - ["3–4", "Trouble",     "Un souvenir ambigu"]
    - ["1–2", "Traumatique", "+1 Écho permanent"]

outcomes_section:
  title: "RÉSULTATS"
  col_headers: ["Clairs", "Résultat", "Conséquence"]
  rows:
    - ["3+", "Succès Total",            "Aucune conséquence."]
    - ["2",  "Succès Partiel",          "Souvenir incomplet ou coût émotionnel."]
    - ["1",  "Vérité Douloureuse",      "Souvenir réel mais douloureux. Stress possible."]
    - ["0",  "Effondrement du Souvenir","+1 Stress. Complication narrative."]

pool_section:
  title: "RÉSERVE ET STRESS"
  formula: "Réserve actuelle = Réserve de base − Stress − Malus d'Écho (min. 1)"
  echi_label: "Échos:"
  echi_rows:
    - ["0–2", "aucun malus"]
    - ["3–5", "−1 dé"]
    - ["6–8", "−3 dés"]
    - ["9+",  "hors jeu"]
  stress_col_headers: ["Stress", "Effet"]
  stress_rows:
    - ["0–2", "Contrôle"]
    - ["3",   "Anxiété croissante"]
    - ["4",   "Effondrement Partiel"]
    - ["5",   "Effondrement Final"]

special_section:
  title: "MÉCANIQUES SPÉCIALES"
  mechanics:
    - name: "Forcer le Souvenir"
      text: "Après Vérité Douloureuse ou Effondrement: améliore le résultat d'un niveau. Coût: +1 Stress. Tu ne peux pas forcer un Succès Partiel."
    - name: "L'Ancre (1× par partie)"
      text: "Avec au moins 2 Stress: narre un moment lié à ton Ancre. Le joueur à ta droite décrit le souvenir associé. −1 Stress, +1 Fragment."
    - name: "Dernier Souvenir (1× par partie)"
      text: "Avec la Réserve à 1 dé: lance 3d6 en ignorant tous les malus. Puis +1 Stress quoi qu'il arrive."
    - name: "La Vérité Émerge Toujours (tour 5 seulement)"
      text: "Un Effondrement révèle quand même le souvenir, mais coûte +2 Stress au lieu de +1. Le Gardien peut ajouter un détail qui aggrave la vérité."

recovery_section:
  title: "RÉCUPÉRATION DE STRESS"
  items:
    - "Vulnérabilité de l'Archétype: −1 Stress, max. 1/tour"
    - "Connexion Humaine: en fin de tours 1–4, si pas d'Effondrement"
    - "Ancre: 1× par partie, nécessite Stress ≥ 2"

sensory_section:
  title: "GÉNÉRATEUR DE DÉCLENCHEURS SENSORIELS (1d6)"
  col_headers: ["d6", "Sens", "Exemples"]
  rows:
    - ["1", "Odorat",  "Désinfectant, fumée, sang, parfum"]
    - ["2", "Ouïe",    "Bourdonnement, interphone, pleurs, verre, silence"]
    - ["3", "Vue",     "Néon vacillant, miroir brisé, ombre mouvante"]
    - ["4", "Toucher", "Froid, humidité, une marque sur la peau"]
    - ["5", "Goût",    "Métallique, amer, médicinal, rouille"]
    - ["6", "Émotion", "Peur soudaine, culpabilité, honte, vide"]

closing_quote: "«Le joueur à ta droite interprète ton jet, pas toi.»"
