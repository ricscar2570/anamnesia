    - "Der Geruch von Desinfektionsmittel, gemischt mit etwas anderem"
    - "Eine Tür, die mit einem endgültigen Klicken schließt"
    - "Das Gesicht von jemandem, den du nicht kennen solltest"
    - "Eine Nummer auf dem Handgelenk tätowiert — deine Nummer"
    - "Das Gefühl zu fallen, dann nichts"
    - "Ein unangebrachtes Lachen im schlimmsten Moment"
