atti:
  - id: act1
    nome: "Acte I"
    tema: "Brume"
    colore: "act1"
    carte:
      - titolo: "Odeur Chimique"
        flavor: "« Ce n'est pas du désinfectant. C'est autre chose. »"
        corpo: "Décrivez l'odeur. Lancez : avec au moins 1 Clair, vous associez l'odeur à un lieu de votre vie. Avec 0 Clair, nausée violente et un flash de <strong>mains gantées</strong>."
        costo: "1 Frag."
        tipo: "Sensorielle"
      - titolo: "Lumière Intermittente"
        flavor: "« Le néon pulse. Comme un battement qui n'est pas le vôtre. »"
        corpo: "Fixez la lumière. Lancez : avec au moins 1 Clair, vous remarquez quelque chose d'écrit sur le néon — un code. Avec 0 Clair, la lumière s'éteint et quand elle revient <strong>quelque chose a changé</strong>."
        costo: "1 Frag."
        tipo: "Sensorielle"
      - titolo: "Chaise Vide"
        flavor: "« Il y a une chaise en trop. Pour qui était-elle ? »"
        corpo: "Lancez : avec 2+ Clairs, vous sentez le parfum de <strong>quelqu'un qui manque</strong>. Avec 1, le coussin est encore chaud. Avec 0, un souvenir violent : <strong>+1 Stress</strong>."
        costo: "1 Frag."
        tipo: "Ambiante"
      - titolo: "Nom au Poignet"
        flavor: "« Quelque chose d'écrit sur votre peau. Votre écriture. »"
        corpo: "Lancez : avec au moins 1 Clair, le nom est familier. Avec 0, vous le prononcez et quelqu'un <strong>réagit</strong>. Le joueur à votre gauche décide qui."
        costo: "2 Frag."
        tipo: "Personnelle"
      - titolo: "Bourdonnement Lointain"
        flavor: "« Sous le silence, il y a un son. Constant. »"
        corpo: "Suivez le son. Lancez : avec au moins 1 Clair, il vient de <strong>sous le plancher</strong>. Avec 0, il devient un cri — personne d'autre ne l'entend."
        costo: "1 Frag."
        tipo: "Sensorielle"
      - titolo: "Marque sur la Main"
        flavor: "« Un pansement. Un bleu. Un point d'injection. »"
        corpo: "Lancez : avec au moins 1 Clair, vous vous souvenez d'un <strong>froid dans les veines</strong>. Avec 0, en dessous il y a un numéro au stylo. Votre numéro de lit."
        costo: "1 Frag."
        tipo: "Personnelle"
      - titolo: "Miroir Fêlé"
        flavor: "« Quelqu'un l'a frappé avec force. »"
        corpo: "Regardez-vous. Lancez : avec au moins 1 Clair, le reflet semble <strong>faux</strong> — plus de temps a passé. Avec 0, vous voyez un autre visage derrière le vôtre."
        costo: "1 Frag."
        tipo: "Sensorielle"
      - titolo: "Couloir Fermé"
        flavor: "« La porte est fermée. Une fissure. Odeur douceâtre. »"
        corpo: "Lancez : avec au moins 1 Clair, vous voyez des <strong>pieds immobiles</strong>. Avec 0, quelqu'un frappe un coup. <strong>Tous +1 Stress.</strong>"
        costo: "2 Frag."
        tipo: "Ambiante"

  - id: act2
    nome: "Acte II"
    tema: "Connexions"
    colore: "act2"
    carte:
      - titolo: "Le Formulaire de Consentement"
        flavor: "« Une feuille froissée. Votre signature. »"
        corpo: "Lancez : avec 2+ Clairs, signé <strong>volontairement</strong> mais sous pression. Avec 1, vous ne vous souvenez pas. Avec 0, procédure inacceptable. <strong>+1 Stress.</strong>"
        costo: "2 Frag."
        tipo: "Document"
      - titolo: "La Voix Enregistrée"
        flavor: "« Un enregistreur sous un matelas. »"
        corpo: "Lancez : avec 2+ Clairs, c'est <strong>votre voix</strong> parlant à la troisième personne. Avec 1, des sanglots. Avec 0, elle dit un nom. <strong>Le joueur à votre droite décide lequel.</strong>"
        costo: "2 Frag."
        tipo: "Découverte"
      - titolo: "La Photographie"
        flavor: "« Une photo. Vous y êtes tous. Et une personne en plus. »"
        corpo: "Lancez : avec au moins 1 Clair, le lieu <strong>n'est pas cette clinique</strong>. Avec 0, visage effacé. <strong>Chaque joueur décrit un détail.</strong>"
        costo: "2 Frag."
        tipo: "Relationnelle"
      - titolo: "Le Cinquième Lit"
        flavor: "« Refait avec trop de soin. »"
        corpo: "Lancez : avec 2+ Clairs, vous trouvez un <strong>bracelet identique</strong>. Avec 1, utilisé récemment. Avec 0, sous l'oreiller une lettre. <strong>Le Gardien la lit.</strong>"
        costo: "2 Frag."
        tipo: "Ambiante"
      - titolo: "Cicatrices Jumelles"
        flavor: "« La même marque. Au même endroit. »"
        corpo: "Lancez : avec au moins 1 Clair, vous vous souvenez d'une <strong>salle avec plusieurs lits</strong>. Avec 0, flash-back partagé : l'autre voit, vous ressentez."
        costo: "1 Frag."
        tipo: "Relationnelle"
      - titolo: "L'Interphone"
        flavor: "« Il grésille. Une voix mécanique dit un numéro. »"
        corpo: "Lancez : avec 2+ Clairs, le numéro est <strong>une date, un code</strong>. Avec 1, voix familière. Avec 0, elle dit votre nom. <strong>+1 Stress.</strong>"
        costo: "1 Frag."
        tipo: "Découverte"
      - titolo: "Le Dossier Médical"
        flavor: "« Dans un tiroir. Votre nom sur la couverture. »"
        corpo: "Lancez : avec 2+ Clairs, diagnostic <strong>différent</strong>. Avec 1, pages arrachées. Avec 0, une photo de vous que vous ne reconnaissez pas. <strong>+1 Stress.</strong>"
        costo: "2 Frag."
        tipo: "Document"
      - titolo: "Le Souvenir Contesté"
        flavor: "« Deux d'entre vous se souviennent du même moment. Différemment. »"
        corpo: "<strong>Pas de lancer.</strong> Le Gardien choisit 2 joueurs. Chacun décrit le même moment. Ils se contredisent. Les autres décident lequel <strong>leur semble</strong> vrai."
        costo: "0 Frag."
        tipo: "Narrative"

  - id: act3
    nome: "Acte III"
    tema: "Révélations"
    colore: "act3"
    carte:
      - titolo: "La Vidéo de la Procédure"
        flavor: "« Une tablette. Vous ne voulez pas appuyer sur Play. »"
        corpo: "Lancez : avec 2+ Clairs, vous êtes <strong>observateurs, pas patients</strong>. Avec 1, vidéo partielle. Avec 0, vous souriez. <strong>+2 Stress. Tous +1.</strong>"
        costo: "3 Frag."
        tipo: "Révélation"
      - titolo: "La Salle en Dessous"
        flavor: "« La porte dans le sol. Des escaliers dans le noir. »"
        corpo: "Lancez : avec 2+ Clairs, salle identique, <strong>lits occupés</strong>. Avec 1, des écrits sur les murs. Avec 0, dans le miroir <strong>vous n'êtes pas seuls</strong>. Tous +1 Stress."
        costo: "3 Frag."
        tipo: "Ambiante"
      - titolo: "Le Participant Disparu"
        flavor: "« Vous le retrouvez. Pas là où vous l'attendiez. »"
        corpo: "Lancez : avec 2+ Clairs, <strong>c'est vous</strong>. Avec 1, il ne vous reconnaît pas. Avec 0 : <strong>« Tu n'aurais pas dû revenir. »</strong> +2 Stress."
        costo: "3 Frag."
        tipo: "Révélation"
      - titolo: "La Confession"
        flavor: "« Quelqu'un sait. Depuis toujours. »"
        corpo: "<strong>Pas de lancer.</strong> « Qu'avez-vous fait la veille ? » Chaque réponse cache un secret. La dernière : <strong>« Pourquoi ne l'avez-vous pas dit avant ? »</strong>"
        costo: "0 Frag."
        tipo: "Narrative"
      - titolo: "Le Journal du Docteur"
        flavor: "« Dans une blouse. Dernières pages écrites à la hâte. »"
        corpo: "Lancez : avec 2+ Clairs, <strong>ça a trop bien fonctionné</strong>. Avec 1, « Ils ne doivent pas savoir. » Avec 0, adressé <strong>à vous</strong>. +2 Stress."
        costo: "2 Frag."
        tipo: "Document"
      - titolo: "La Porte Ouverte"
        flavor: "« La porte est ouverte. Elle l'a toujours été. »"
        corpo: "Lancez : avec 2+ Clairs, vous comprenez pourquoi <strong>personne n'est sorti</strong>. Avec 0, vous vous retrouvez dans la même pièce. <strong>Si Cycle 5, fin de partie.</strong>"
        costo: "2 Frag."
        tipo: "Finale"
      - titolo: "Le Choix"
        flavor: "« Pour oublier. »"
        corpo: "<strong>Carte Finale.</strong> « Si vous pouviez oublier à nouveau, le feriez-vous ? » Qui oublie perd ses Échos. Qui se souvient garde tout. <strong>La partie se termine.</strong>"
        costo: "0 Frag."
        tipo: "Épilogue"
      - titolo: "Échos de la Salle 0"
        flavor: "« Le bourdonnement s'arrête. Silence. »"
        corpo: "Lancez <strong>tous</strong> vos Fragments. 3+ : mémoire complète. 1–2 : le joueur à droite comble les vides. 0 : <strong>c'est pire</strong>. +2 Stress. Effondrement."
        costo: "Tous"
        tipo: "Révélation"
