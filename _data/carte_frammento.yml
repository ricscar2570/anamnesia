    - "Mormora numeri sottovoce quando è nervoso"
    - "Chiude gli occhi brevemente prima di parlare"
    - "Si guarda le mani come se non le riconoscesse"
    - "Sobbalza ai rumori improvvisi"
    - "Conta le uscite appena entra in una stanza"
    - "Strofina un punto preciso sul braccio"
    - "Trattiene il respiro quando qualcuno alza la voce"
    - "Ripete l'ultima parola che ha sentito, sottovoce"
    - "Si morde l'interno della guancia quando pensa"
    - "Fissa le luci al neon con sospetto"
    - "Controlla se gli altri dormono prima di muoversi"
  frammenti:
