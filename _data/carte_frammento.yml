    - "Una voce gentile che dice «Andrà tutto bene»"
    - "Le mani legate con fascette morbide"
    - "Un corridoio lunghissimo, luci bianche"
    - "Qualcuno che piange nella stanza accanto"
    - "Un modulo firmato con mano tremante"
    - "L'odore del disinfettante mescolato a qualcos'altro"
    - "Una porta che si chiude con un clic definitivo"
    - "Il volto di qualcuno che non dovresti conoscere"
    - "Un numero tatuato sul polso — il tuo numero"
    - "La sensazione di cadere, poi il nulla"
    - "Una risata inappropriata nel momento peggiore"
