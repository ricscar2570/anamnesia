name: Genera PDF

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Installa dipendenze
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc fonts-dejavu python3-pip
          pip install weasyprint pyyaml --break-system-packages

      - name: Genera PDF Completo (Zine)
        run: bash scripts/build-pdf.sh

      - name: Genera PDF Quickstart (Gratuito)
        run: bash scripts/build-quickstart.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anamnesia-pdfs
          path: |
            output/anamnesia-zine.pdf
            output/anamnesia-quickstart-free.pdf

      - name: Crea Release con entrambi i PDF
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/anamnesia-zine.pdf
            output/anamnesia-quickstart-free.pdf
          generate_release_notes: true

      - name: Setup butler per itch.io
        if: startsWith(github.ref, 'refs/tags/')
        uses: remarkablegames/setup-butler@v2

      - name: Push Quickstart gratuito su itch.io
        if: startsWith(github.ref, 'refs/tags/')
        run: butler push output/anamnesia-quickstart-free.pdf ${{ vars.ITCHIO_USER }}/anamnesia:pdf --userversion ${GITHUB_REF#refs/tags/v}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
