name: Build PDFs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc fonts-dejavu python3-pip
          pip install weasyprint pyyaml --break-system-packages

      - name: Build Italian Zine
        run: LANG=it bash scripts/build-pdf.sh

      - name: Build Italian Quickstart
        run: LANG=it bash scripts/build-quickstart.sh

      - name: Build English Zine
        run: LANG=en bash scripts/build-pdf.sh

      - name: Build English Quickstart
        run: LANG=en bash scripts/build-quickstart.sh

      - name: Build Spanish Zine
        run: LANG=es bash scripts/build-pdf.sh

      - name: Build Spanish Quickstart
        run: LANG=es bash scripts/build-quickstart.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anamnesia-pdfs
          path: |
            output/anamnesia-zine.pdf
            output/anamnesia-quickstart-it.pdf
            output/anamnesia-zine-en.pdf
            output/anamnesia-quickstart-en.pdf
            output/anamnesia-zine-es.pdf
            output/anamnesia-quickstart-es.pdf

      - name: Create Release with all PDFs
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/anamnesia-zine.pdf
            output/anamnesia-quickstart-it.pdf
            output/anamnesia-zine-en.pdf
            output/anamnesia-quickstart-en.pdf
            output/anamnesia-zine-es.pdf
            output/anamnesia-quickstart-es.pdf
          generate_release_notes: true

      - name: Setup butler for itch.io
        if: startsWith(github.ref, 'refs/tags/')
        uses: remarkablegames/setup-butler@v2

      - name: Push Italian Quickstart to itch.io
        if: startsWith(github.ref, 'refs/tags/')
        run: butler push output/anamnesia-quickstart-it.pdf ${{ vars.ITCHIO_USER }}/anamnesia:quickstart-it --userversion ${GITHUB_REF#refs/tags/v}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}

      - name: Push English Quickstart to itch.io
        if: startsWith(github.ref, 'refs/tags/')
        run: butler push output/anamnesia-quickstart-en.pdf ${{ vars.ITCHIO_USER }}/anamnesia:quickstart-en --userversion ${GITHUB_REF#refs/tags/v}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}

      - name: Push Spanish Quickstart to itch.io
        if: startsWith(github.ref, 'refs/tags/')
        run: butler push output/anamnesia-quickstart-es.pdf ${{ vars.ITCHIO_USER }}/anamnesia:quickstart-es --userversion ${GITHUB_REF#refs/tags/v}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
