name: Genera PDF

on:
  push:
    tags:
      - 'v*'  # Si attiva quando crei un tag tipo v1.3, v1.4, ecc.
  workflow_dispatch:  # Permette di lanciarlo manualmente

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Installa dipendenze
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc fonts-dejavu python3-pip
          pip install weasyprint pyyaml --break-system-packages

      - name: Genera PDF
        run: bash scripts/build-pdf.sh

      - name: Upload PDF come artifact
        uses: actions/upload-artifact@v4
        with:
          name: anamnesia-quickstart
          path: output/anamnesia-quickstart.pdf

      - name: Crea Release con PDF allegato
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: output/anamnesia-quickstart.pdf
          generate_release_notes: true

      - name: Upload su itch.io
        if: startsWith(github.ref, 'refs/tags/')
        uses: remarkablegames/setup-butler@v2

      - name: Push PDF su itch.io
        if: startsWith(github.ref, 'refs/tags/')
        run: butler push output/anamnesia-quickstart.pdf ${{ vars.ITCHIO_USER }}/anamnesia:pdf --userversion ${GITHUB_REF#refs/tags/v}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
